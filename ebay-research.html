<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>eBayリサーチ判定ビュー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./ebay-research.css?v=20260606-2" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <script src="./ebay-research.js?v=20260606-2" defer></script>
  </head>
  <body>
    <main class="research-shell">
      <aside class="product-panel" aria-label="出品候補一覧">
        <header class="panel-head">
          <a class="back-link" href="./index.html">
            <i data-lucide="arrow-left" aria-hidden="true"></i>
            業務ハブ
          </a>
          <div>
            <p class="eyebrow">EBAY RESEARCH</p>
            <h1>出品判定ビュー</h1>
          </div>
        </header>

        <section class="summary-strip" aria-label="判定集計">
          <div class="summary-card">
            <span>総数</span>
            <strong id="summaryTotal">--</strong>
          </div>
          <div class="summary-card ok">
            <span>◯</span>
            <strong id="summaryOk">--</strong>
          </div>
          <div class="summary-card warn">
            <span>△</span>
            <strong id="summaryMaybe">--</strong>
          </div>
          <div class="summary-card ng">
            <span>✗</span>
            <strong id="summaryNo">--</strong>
          </div>
        </section>

        <label class="search-field" for="productSearch">
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="productSearch" type="search" autocomplete="off" placeholder="タイトル・型番・キーワード" />
        </label>

        <div class="filter-bar" aria-label="絞り込み">
          <button class="chip is-active" type="button" data-filter="decision" data-value="all">すべて</button>
          <button class="chip" type="button" data-filter="decision" data-value="◯">◯</button>
          <button class="chip" type="button" data-filter="decision" data-value="△">△</button>
          <button class="chip" type="button" data-filter="decision" data-value="✗">✗</button>
          <button class="chip" type="button" data-filter="decision" data-value="保留">保留</button>
        </div>

        <div class="select-row">
          <label>
            <span>送料区分</span>
            <select id="classFilter">
              <option value="all">すべて</option>
              <option value="小型">小型</option>
              <option value="中型">中型</option>
              <option value="長尺">長尺</option>
              <option value="大型">大型</option>
            </select>
          </label>
          <label>
            <span>並び順</span>
            <select id="sortSelect">
              <option value="sheet">シート順</option>
              <option value="profit">利益順</option>
              <option value="sold">Sold順</option>
              <option value="price">売価順</option>
              <option value="dutyProfit">関税込み利益順</option>
            </select>
          </label>
        </div>

        <div class="result-line" id="resultLine">読み込み中</div>
        <div class="product-list" id="productList"></div>
      </aside>

      <section class="preview-panel" aria-live="polite">
        <div class="loading-state" id="loadingState">
          <i data-lucide="loader-circle" aria-hidden="true"></i>
          <p>データを読み込んでいます</p>
        </div>
        <article class="product-preview" id="productPreview" hidden></article>
      </section>
    </main>
  </body>
</html>
